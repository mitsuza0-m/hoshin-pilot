<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoshin — 指針書を読む</title>
<style>
:root{
  --ink:#1e1c18;--ink-2:#4a4740;--ink-3:#8a877e;--ink-4:#c4c1b8;
  --bg:#f4f2ed;--surface:#fff;--border:#e2dfd6;
  --owner:#2d5a3d;--owner-md:#1a8060;--owner-lt:#e4f3ed;
  --gold:#8a6a1a;--gold-lt:#fdf6e3;
  --teal:#0e5c46;--purple:#3d3591;--purple-lt:#eeedfe;
  --radius:12px;--radius-sm:8px;--shadow:0 2px 8px rgba(0,0,0,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;min-height:100vh}

/* ── ナビ ── */
.nav{background:var(--owner);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-inner{max-width:820px;margin:0 auto;padding:0 18px;height:54px;display:flex;align-items:center;gap:12px}
.nav-logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.nav-logo svg{width:20px;height:20px}
.nav-back{margin-left:auto;font-size:13px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.14);border:none;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:inherit}
.nav-back:hover{background:rgba(255,255,255,.24)}

/* ── ページ ── */
.page{max-width:820px;margin:0 auto;padding:28px 18px 60px}

/* ── ヘッダ ── */
.doc-head{text-align:center;padding:22px 16px 26px}
.doc-eyebrow{font-size:12px;letter-spacing:.14em;color:var(--owner-md);font-weight:600;margin-bottom:8px}
.doc-title{font-size:26px;font-weight:800;letter-spacing:.02em;color:var(--owner);margin-bottom:8px}
.doc-meta{font-size:12px;color:var(--ink-3)}
.doc-pub{display:inline-flex;align-items:center;gap:5px;background:var(--owner-lt);color:var(--owner);font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin-top:8px}

/* ── セクションカード ── */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:14px}
.sec-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--owner-md);letter-spacing:.05em;margin-bottom:4px}
.sec-no{background:var(--owner-lt);color:var(--owner);border-radius:5px;padding:2px 8px;font-size:11px}
.sec-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:12px}
.sec-body{font-size:15px;color:var(--ink);line-height:1.9;white-space:pre-wrap}

/* 志（最重要）を大きく */
.sec.hero{background:linear-gradient(135deg,var(--owner-lt),#eef6f0);border-color:#b8d8c0}
.sec.hero .sec-body{font-size:19px;font-weight:700;color:var(--owner);line-height:1.7}

.muted{color:var(--ink-4);font-size:14px;font-style:normal;font-weight:500}

/* バリュー・行動指針リスト */
.item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--owner-lt);color:var(--owner);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.item-t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.item-d{font-size:13px;color:var(--ink-2);line-height:1.7}

/* KGIリスト */
.goal{padding:11px 0;border-bottom:1px solid var(--border)}
.goal:last-child{border-bottom:none}
.goal-top{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.goal-name{font-size:14px;font-weight:600;color:var(--ink);flex:1}
.goal-num{font-size:12px;color:var(--ink-3);white-space:nowrap}
.goal-num strong{color:var(--ink)}
.bar-wrap{height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar{height:100%;border-radius:4px;background:var(--owner-md)}
.bar.gold{background:#d4a847}

/* 空状態 */
.empty{text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:44px 24px;color:var(--ink-3)}
.empty-emoji{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.empty-desc{font-size:13px;line-height:1.8;margin-bottom:18px}
.empty-btn{display:inline-block;background:var(--owner);color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:10px 20px;border-radius:var(--radius-sm)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.doc-title{font-size:22px}.sec.hero .sec-body{font-size:17px}}
</style>
<script src="gate.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Hoshin
    </div>
    <button class="nav-back" onclick="goBack()">← 戻る</button>
  </div>
</nav>

<main class="page">
  <div class="doc-head">
    <div class="doc-eyebrow">OUR PHILOSOPHY</div>
    <div class="doc-title">会社の指針書</div>
    <div class="doc-meta">私たちが大切にしている考えと、目指す姿</div>
    <div id="pub-badge"></div>
  </div>

  <div id="doc-content"></div>
</main>

<div class="toast" id="toast"></div>

<script src="data/store.js"></script>
<script src="data/team.js"></script>
<script src="data/goals.js"></script>
<script>
function goBack() {
  if (document.referrer) { history.back(); }
  else { location.href = '00_index.html'; }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 本文セクション（空なら「準備中」）
function textSection(no, title, value, hero){
  const body = value
    ? '<div class="sec-body">' + esc(value) + '</div>'
    : '<div class="sec-body muted">準備中です。</div>';
  return (
    '<div class="sec' + (hero ? ' hero' : '') + '">' +
      '<div class="sec-tag"><span class="sec-no">' + no + '</span></div>' +
      '<div class="sec-title">' + title + '</div>' +
      body +
    '</div>'
  );
}

// リストセクション（バリュー・行動指針）
function listSection(no, title, items){
  let inner;
  if (items && items.length) {
    inner = items.map((it, i) =>
      '<div class="item">' +
        '<div class="item-n">' + (i + 1) + '</div>' +
        '<div><div class="item-t">' + esc(it.title || '（無題）') + '</div>' +
          (it.desc ? '<div class="item-d">' + esc(it.desc) + '</div>' : '') +
        '</div>' +
      '</div>'
    ).join('');
  } else {
    inner = '<div class="sec-body muted">準備中です。</div>';
  }
  return (
    '<div class="sec">' +
      '<div class="sec-tag"><span class="sec-no">' + no + '</span></div>' +
      '<div class="sec-title">' + title + '</div>' + inner +
    '</div>'
  );
}

// 目標（KGI）セクション
function goalSection(no){
  const kgi = HoshinGoals.kgi();
  let inner;
  if (kgi && kgi.length) {
    inner = kgi.map(g =>
      '<div class="goal">' +
        '<div class="goal-top">' +
          '<span class="goal-name">' + esc(g.name) + '</span>' +
          '<span class="goal-num">今 <strong>' + esc(g.current) + '</strong> / 目標 ' + esc(g.target) + '</span>' +
        '</div>' +
        '<div class="bar-wrap"><div class="bar ' + (g.pct >= 90 ? '' : 'gold') + '" style="width:' + Math.min(100, g.pct) + '%"></div></div>' +
      '</div>'
    ).join('');
  } else {
    inner = '<div class="sec-body muted">準備中です。</div>';
  }
  return (
    '<div class="sec">' +
      '<div class="sec-tag"><span class="sec-no">' + no + '</span></div>' +
      '<div class="sec-title">今年度の目標（会社全体・KGI）</div>' + inner +
    '</div>'
  );
}

function render(){
  const isPreview = /[?&]preview=1/.test(location.search);
  const p = isPreview
    ? HoshinStore.get('policyPreview', null)
    : HoshinStore.get('policyPublished', null);
  const badge = document.getElementById('pub-badge');
  const content = document.getElementById('doc-content');

  if (!p) {
    badge.innerHTML = '';
    content.innerHTML =
      '<div class="empty">' +
        '<div class="empty-emoji">📖</div>' +
        '<div class="empty-title">指針書はまだ公開されていません</div>' +
        '<div class="empty-desc">経営者が指針書を作成・公開すると、ここに全社の志・理念・行動指針が表示されます。</div>' +
        '<a class="empty-btn" href="03_policy_editor.html">指針書をつくる →</a>' +
      '</div>';
    return;
  }

  badge.innerHTML = isPreview
    ? '<span class="doc-pub" style="background:var(--gold-lt);color:var(--gold)">👁 プレビュー（下書き・未公開）</span>'
    : '<span class="doc-pub">📢 ' + esc(p.publishedAt || '') + ' 公開</span>';
  content.innerHTML =
    textSection('01 志',       'なぜこの仕事をしているのか',     p.aspiration, true) +
    textSection('02 理念',     '会社はなぜ存在するのか',         p.philosophy) +
    textSection('03 ビジョン', '目指す姿',                       p.vision) +
    textSection('04 ミッション','私たちは何をする会社か',        p.mission) +
    listSection('05 バリュー', '大切にする価値観',               p.values) +
    listSection('06 行動指針', '明日から実践できる行動のルール', p.guidelines) +
    textSection('07 方針',     '今年度、何を重視するか',         p.policy) +
    textSection('08 戦略',     'どう勝ち、どう差別化するか',     p.strategy) +
    goalSection('09 目標');
}

render();
</script>
</body>
</html>
